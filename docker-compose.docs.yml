services:
  docs:
    image: everdries_ad_generator_local_docs
    container_name: everdries_ad_generator_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./everdries_ad_generator:/app/everdries_ad_generator:z
    ports:
      - '9000:9000'
    command: /start-docs
