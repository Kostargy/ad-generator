{% extends "base_tailwind.html" %}

{% block title %}Edit Persona - Everdries Ad Generator{% endblock title %}

{% block content %}
<div>
  <!-- Back Link -->
  <a href="{% url 'campaigns:persona_list' %}"
     class="inline-flex items-center text-sm text-gray-600 hover:text-gray-800 mb-6">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
    </svg>
    Back to Personas
  </a>

  <!-- Page Title -->
  <h1 class="text-2xl font-semibold text-gray-800 mb-6">Edit Persona</h1>

  <!-- Content Card -->
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-2xl">
    <form method="POST">
      {% csrf_token %}

      <div class="space-y-4">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input type="text" name="name" id="name" required
                 value="{{ persona.name }}"
                 class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea name="description" id="description" rows="4"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    placeholder="Describe this persona...">{{ persona.description }}</textarea>
        </div>
      </div>

      <div class="mt-6 flex justify-end space-x-3">
        <a href="{% url 'campaigns:persona_list' %}"
           class="px-4 py-2 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-50 transition-colors">
          Cancel
        </a>
        <button type="submit"
                class="px-4 py-2 bg-green-500 text-white rounded-md text-sm hover:bg-green-600 transition-colors">
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
