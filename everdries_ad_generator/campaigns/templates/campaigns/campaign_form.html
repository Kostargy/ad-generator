{% extends "base_tailwind.html" %}

{% block title %}{{ page_title }} - Everdries Ad Generator{% endblock title %}

{% block content %}
<div>
  <!-- Breadcrumb -->
  <nav class="mb-6">
    <a href="{% url 'campaigns:dashboard' %}" class="text-green-600 hover:text-green-700">
      &larr; Back to Dashboard
    </a>
  </nav>

  <!-- Page Title -->
  <h1 class="text-2xl font-semibold text-gray-800 mb-6">{{ page_title }}</h1>

  <!-- Form Card -->
  <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-2xl">
    <form method="post" action="{{ form_action }}">
      {% csrf_token %}

      <!-- Campaign Name -->
      <div class="mb-6">
        <label for="name" class="block text-sm font-medium text-gray-700 mb-2">
          Campaign Name <span class="text-red-500">*</span>
        </label>
        <input type="text"
               id="name"
               name="name"
               required
               value="{{ campaign.name|default:'' }}"
               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
               placeholder="e.g., Spring Special Sale">
      </div>

      <!-- Description -->
      <div class="mb-6">
        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
          Description
        </label>
        <textarea id="description"
                  name="description"
                  rows="4"
                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                  placeholder="Brief description of this campaign...">{{ campaign.description|default:'' }}</textarea>
      </div>

      <!-- Form Actions -->
      <div class="flex justify-end space-x-3 pt-4 border-t border-gray-200">
        <a href="{% url 'campaigns:dashboard' %}"
           class="px-4 py-2 border border-gray-300 rounded-md text-sm text-gray-700 hover:bg-gray-100 transition-colors">
          Cancel
        </a>
        <button type="submit"
                class="px-4 py-2 bg-green-500 text-white rounded-md text-sm hover:bg-green-600 transition-colors">
          {% if is_edit %}Update Campaign{% else %}Create Campaign{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
